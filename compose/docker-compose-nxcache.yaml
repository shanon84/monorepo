services:
  minio:
    image: quay.io/minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    hostname: minio
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/remotecache --ignore-existing;
      mc ilm add myminio/remotecache --expiry-days 7;
      echo 'Bucket remotecache created with 7 days expiry policy';
      exit 0;
      "

  nx-cache-server:
    image: ghcr.io/ikatsuba/nx-cache-server:latest
    ports:
      - "3000:3000"
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: remotecache
      S3_ENDPOINT_URL: http://minio:9000
      NX_CACHE_ACCESS_TOKEN: my-secret-token
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
